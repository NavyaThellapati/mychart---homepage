services:
  - type: web
    name: mychart-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mychart-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false

databases:
  - name: mychart-postgres
    plan: free
    databaseName: mychart
    user: mychart
