name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mychart_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mychart_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mychart_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mychart_test
      JWT_SECRET: ci-only-jwt-secret-with-at-least-thirty-two-characters
      CLIENT_URL: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run typecheck

      - name: Run backend integration tests
        run: npm run test:server
        env:
          NODE_ENV: test

      - name: Build production frontend
        run: npm run build